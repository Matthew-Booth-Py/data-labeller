{% load static i18n %}

{% if messages %}
<div class="position-fixed top-0 end-0 p-3 mb-3" style="z-index: 99999">
    {% for message in messages %}
    <div class="toast fade show"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">
        <div class="toast-header">
            <img src="{% static APP_LOGO %}"
                 class="img-fluid me-1"
                 alt="images"
                 style="width: 17px" />
            <strong class="me-auto">{{ APP_NAME }}</strong>
            <small>{% trans 'now' %}</small>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="toast"
                    aria-label="Close"></button>
        </div>
        <div class="toast-body">{{ message }}</div>
    </div>
    {% endfor %}
</div>
{% endif %}
