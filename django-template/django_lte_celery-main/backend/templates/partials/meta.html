{% load static i18n humanize %}

<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<!--begin::Accessibility Meta Tags-->
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<meta name="color-scheme" content="light dark" />
<meta name="theme-color"
      content="#007bff"
      media="(prefers-color-scheme: light)" />
<meta name="theme-color"
      content="#1a1a1a"
      media="(prefers-color-scheme: dark)" />
<!--end::Accessibility Meta Tags-->
<!--begin::Primary Meta Tags-->
<meta name="title" content="{% if page_title %}{{ page_title }}{% else %} {{ APP_NAME }}{% endif %}" />
<meta name="author" content="{{ APP_NAME }}" />
<meta name="description"
      content="{% trans "Backend is an amazing application bootstrap template that will speed up the development of any new application since it has pre-configured components and features." %}" />
<meta name="keywords"
      content="{% trans "SaaS, backend, bootstrap, admin template, django, AI" %}" />
<!--end::Primary Meta Tags-->
<!--begin::Accessibility Features-->
<!-- Skip links will be dynamically added by accessibility.js -->
<meta name="supported-color-schemes" content="light dark" />
