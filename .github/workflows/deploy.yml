name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version/tag to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Determine environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine version
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Display deployment info
        run: |
          echo "Deploying to: ${{ steps.set-env.outputs.environment }}"
          echo "Version: ${{ steps.set-version.outputs.version }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Deploy to staging
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to staging..."
          # Add your staging deployment commands here
          # Examples:
          # - kubectl apply -f k8s/staging/
          # - helm upgrade --install app ./chart --namespace staging
          # - docker stack deploy -c docker-compose.staging.yml app
          echo "Staging deployment completed!"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Add smoke test commands here
          # curl -f https://staging.example.com/health
          echo "Smoke tests passed!"

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            const message = `Staging Deployment ${status}\nVersion: ${{ needs.prepare.outputs.version }}`;
            console.log(message);

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://app.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Pre-deployment checks
        run: |
          echo "Running pre-deployment checks..."
          # Add pre-deployment validation
          echo "Pre-deployment checks passed!"

      - name: Deploy to production
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to production..."
          # Add your production deployment commands here
          # Examples:
          # - kubectl apply -f k8s/production/
          # - helm upgrade --install app ./chart --namespace production
          # - docker stack deploy -c docker-compose.production.yml app
          echo "Production deployment completed!"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on production..."
          # Add smoke test commands here
          # curl -f https://app.example.com/health
          echo "Smoke tests passed!"

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ needs.prepare.outputs.version }}',
              environment: 'production',
              description: 'Production deployment',
              auto_merge: false,
              required_contexts: []
            });

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ Success' : '❌ Failed';
            const message = `Production Deployment ${status}\nVersion: ${{ needs.prepare.outputs.version }}`;
            console.log(message);

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'workflow_dispatch'
    needs: [deploy-staging, deploy-production]
    environment:
      name: ${{ needs.prepare.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rollback deployment
        run: |
          echo "Rolling back deployment..."
          # Add rollback commands here
          # Examples:
          # - kubectl rollout undo deployment/app
          # - helm rollback app
          echo "Rollback completed!"

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            const message = `⚠️ Deployment rolled back for version ${{ needs.prepare.outputs.version }}`;
            console.log(message);
