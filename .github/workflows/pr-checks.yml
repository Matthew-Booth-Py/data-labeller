name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [master, main, develop]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.

      - name: Check PR has description
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "Error: Pull request must have a description"
            exit 1
          fi
          echo "PR description found"

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const changes = additions + deletions;

            const maxChanges = 1000;
            const warningChanges = 500;

            if (changes > maxChanges) {
              core.setFailed(`PR is too large (${changes} changes). Consider breaking it into smaller PRs.`);
            } else if (changes > warningChanges) {
              core.warning(`PR is quite large (${changes} changes). Consider breaking it into smaller PRs for easier review.`);
            } else {
              core.info(`PR size is acceptable (${changes} changes).`);
            }

  changed-files:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'
            docs:
              - '**.md'
              - 'docs/**'
            workflows:
              - '.github/workflows/**'

  backend-checks:
    name: Backend Quality Gates
    needs: changed-files
    if: needs.changed-files.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for backend CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'All Checks Passed'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  frontend-checks:
    name: Frontend Quality Gates
    needs: changed-files
    if: needs.changed-files.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for frontend CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'All Checks Passed'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    needs: changed-files
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Add labels based on changed files
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [];

            if ('${{ needs.changed-files.outputs.backend }}' === 'true') {
              labels.push('backend');
            }
            if ('${{ needs.changed-files.outputs.frontend }}' === 'true') {
              labels.push('frontend');
            }
            if ('${{ needs.changed-files.outputs.docker }}' === 'true') {
              labels.push('docker');
            }
            if ('${{ needs.changed-files.outputs.docs }}' === 'true') {
              labels.push('documentation');
            }
            if ('${{ needs.changed-files.outputs.workflows }}' === 'true') {
              labels.push('ci/cd');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }

  conflict-check:
    name: Check for Merge Conflicts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          if git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q "<<<<<"; then
            echo "Error: This PR has merge conflicts with ${{ github.base_ref }}"
            exit 1
          fi
          echo "No merge conflicts detected"

  security-check:
    name: Security Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in diff
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

  comment-summary:
    name: Post PR Summary
    runs-on: ubuntu-latest
    needs: [pr-metadata, changed-files, conflict-check]
    if: always()
    permissions:
      pull-requests: write

    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const changedFiles = {
              backend: '${{ needs.changed-files.outputs.backend }}' === 'true',
              frontend: '${{ needs.changed-files.outputs.frontend }}' === 'true',
              docker: '${{ needs.changed-files.outputs.docker }}' === 'true',
              docs: '${{ needs.changed-files.outputs.docs }}' === 'true',
              workflows: '${{ needs.changed-files.outputs.workflows }}' === 'true'
            };

            let comment = '## 🤖 PR Analysis Summary\n\n';
            comment += '### Changed Components\n';

            const components = [];
            if (changedFiles.backend) components.push('✅ Backend');
            if (changedFiles.frontend) components.push('✅ Frontend');
            if (changedFiles.docker) components.push('🐳 Docker');
            if (changedFiles.docs) components.push('📚 Documentation');
            if (changedFiles.workflows) components.push('⚙️ CI/CD');

            if (components.length === 0) {
              comment += 'No significant changes detected.\n';
            } else {
              comment += components.join('\n') + '\n';
            }

            comment += '\n### Required Checks\n';
            comment += '- CI workflows will run automatically\n';
            comment += '- Security scans are in progress\n';
            comment += '- All checks must pass before merging\n';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

  all-checks-passed:
    name: All PR Checks Passed
    runs-on: ubuntu-latest
    needs: [pr-metadata, changed-files, conflict-check, security-check]
    if: always()

    steps:
      - name: Verify all checks passed
        run: |
          if [[ "${{ needs.pr-metadata.result }}" != "success" ]] || \
             [[ "${{ needs.conflict-check.result }}" != "success" ]] || \
             [[ "${{ needs.security-check.result }}" != "success" ]]; then
            echo "One or more PR checks failed"
            exit 1
          fi
          echo "All PR checks passed!"
