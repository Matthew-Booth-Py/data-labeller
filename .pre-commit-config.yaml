# Pre-commit hooks configuration
# See https://pre-commit.com for more information

default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]

repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
        args: ['--fix=lf']

  # Backend: Python formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        stages: [pre-commit]
        args: [--fix]
        files: ^backend/
      # Run the formatter
      - id: ruff-format
        stages: [pre-commit]
        files: ^backend/

  # Backend: Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        stages: [pre-commit]
        files: ^backend/src/
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - types-python-dateutil
          - types-PyYAML
          - types-redis
          - django-stubs
          - djangorestframework-stubs

  # Backend: Security checks with Bandit
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        stages: [pre-commit]
        args: [-c, backend/pyproject.toml, -r, backend/src/]
        files: ^backend/src/

  # Frontend: Prettier formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        stages: [pre-commit]
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, json, css, scss, markdown]
        exclude: ^frontend/(node_modules|dist|build)/

  # Frontend: ESLint (if configured)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.17.0
    hooks:
      - id: eslint
        stages: [pre-commit]
        files: ^frontend/.*\.[jt]sx?$
        types: [file]
        args: [--fix, --max-warnings=0]
        additional_dependencies:
          - eslint@^9.17.0
          - typescript@^5.6.3
          - '@typescript-eslint/parser@^8.18.1'
          - '@typescript-eslint/eslint-plugin@^8.18.1'

  # Commit message validation
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--force-scope]

  # Docker: Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        stages: [pre-commit]
        args: [--ignore, DL3008, --ignore, DL3009]

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        stages: [pre-commit]
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

# Local hooks for running tests
  - repo: local
    hooks:
      # Backend: Run tests before push
      - id: backend-tests
        name: Backend Tests
        entry: bash -c 'cd backend && uv run pytest tests/ -v --tb=short'
        language: system
        stages: [pre-push]
        pass_filenames: false
        files: ^backend/

      # Backend: Check test coverage
      - id: backend-coverage
        name: Backend Coverage Check
        entry: bash -c 'cd backend && uv run pytest tests/ --cov=src/uu_backend --cov-fail-under=70 --cov-report=term-missing:skip-covered -q'
        language: system
        stages: [pre-push]
        pass_filenames: false
        files: ^backend/

      # Frontend: Type check
      - id: frontend-typecheck
        name: Frontend Type Check
        entry: bash -c 'cd frontend && npm run check'
        language: system
        stages: [pre-push]
        pass_filenames: false
        files: ^frontend/

      # Frontend: Run tests (if configured)
      - id: frontend-tests
        name: Frontend Tests
        entry: bash -c 'cd frontend && if grep -q "\"test\":" package.json; then npm test -- --run; else echo "No tests configured, skipping..."; fi'
        language: system
        stages: [pre-push]
        pass_filenames: false
        files: ^frontend/

      # Docker: Validate docker-compose
      - id: docker-compose-check
        name: Docker Compose Validation
        entry: docker compose config -q
        language: system
        stages: [pre-commit]
        files: docker-compose\.yml
        pass_filenames: false

# Configuration
ci:
  autofix_commit_msg: |
    style: Auto-fix pre-commit hooks

    [pre-commit.ci] auto fixes from pre-commit.com hooks
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore(deps): Update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
