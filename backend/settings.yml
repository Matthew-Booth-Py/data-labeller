api_host: "0.0.0.0"
api_port: 8000
api_prefix: "/api/v1"
debug: false

chroma_persist_directory: "./data/chroma"
chroma_collection_name: "documents"
file_storage_directory: "./data/files"

chunk_size: 1000
chunk_overlap: 200
cors_origins:
  - "http://localhost:3000"
  - "http://127.0.0.1:3000"

neo4j_uri: "bolt://localhost:7687"
neo4j_user: "neo4j"
neo4j_password: "password"

openai_reasoning_effort: "low"
openai_model_pricing:
  # Update this map if your configured model/pricing changes.
  gpt-5-mini:
    input_per_million: 0.25
    output_per_million: 2.0
    cached_input_per_million: 0.025
