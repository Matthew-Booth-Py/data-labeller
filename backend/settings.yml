api_host: "0.0.0.0"
api_port: 8000
api_prefix: "/api/v1"
debug: false

chroma_persist_directory: "./data/chroma"
chroma_collection_name: "documents"
file_storage_directory: "./data/files"
sqlite_database_path: "./data/taxonomy.db"

