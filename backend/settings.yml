chunk_overlap: 200
cors_origins:
  - "http://localhost:3000"
  - "http://127.0.0.1:3000"

neo4j_uri: "bolt://localhost:7687"
neo4j_user: "neo4j"
neo4j_password: "password"

openai_model: "gpt-5-mini"
openai_tagging_model: "gpt-5-mini"
openai_reasoning_effort: "low"
