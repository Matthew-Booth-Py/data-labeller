services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uu-backend
    ports:
      - "8000:8000"
    volumes:
      - file_storage:/app/data/files
      - taxonomy_data:/app/data
      - ./data/documents:/app/data/documents
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=${DEBUG:-false}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - DJANGO_DATABASE_URL=${DJANGO_DATABASE_URL:-postgres://uu:uu@postgres:5432/uu_django}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=uu_backend.django_project.settings.local
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT}
      - AZURE_DI_KEY=${AZURE_DI_KEY}
      - USE_AZURE_OPENAI=${USE_AZURE_OPENAI:-false}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uu-frontend
    ports:
      - "3000:5000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  celeryworker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uu-celeryworker
    command: ["uv", "run", "celery", "-A", "uu_backend.django_project.celery_app", "worker", "-l", "info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=uu_backend.django_project.settings.local
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - DJANGO_DATABASE_URL=${DJANGO_DATABASE_URL:-postgres://uu:uu@postgres:5432/uu_django}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      - AZURE_DI_ENDPOINT=${AZURE_DI_ENDPOINT}
      - AZURE_DI_KEY=${AZURE_DI_KEY}
      - CHUNK_SIZE=${CHUNK_SIZE:-4000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-800}
      - MAX_CONCURRENCY=${MAX_CONCURRENCY:-40}
      - CONTEXT_MODEL=${CONTEXT_MODEL:-gpt-5-mini}
      - USE_AZURE_OPENAI=${USE_AZURE_OPENAI:-false}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
    volumes:
      - file_storage:/app/data/files
      - taxonomy_data:/app/data
      - ./data/documents:/app/data/documents
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: uu-redis
    # Redis is used as a broker/result backend here; keep it ephemeral to avoid
    # startup failures from incompatible persisted dump formats.
    command: ["redis-server", "--save", "", "--appendonly", "no", "--dir", "/tmp"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: uu-postgres
    environment:
      - POSTGRES_DB=uu_django
      - POSTGRES_USER=uu
      - POSTGRES_PASSWORD=uu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uu -d uu_django"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  file_storage:
    driver: local
  taxonomy_data:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: uu-network
