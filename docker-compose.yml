services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uu-backend
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/data/chroma
      - file_storage:/app/data/files
      - taxonomy_data:/app/data
      - ./data/documents:/app/data/documents
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=${DEBUG:-false}
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - DJANGO_DATABASE_URL=${DJANGO_DATABASE_URL:-postgres://uu:uu@postgres:5432/uu_django}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uu-frontend
    ports:
      - "3000:5000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: uu-neo4j
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7.2
    container_name: uu-redis
    restart: unless-stopped

  celeryworker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uu-celeryworker
    command: ["uv", "run", "celery", "-A", "uu_backend.django_project.celery_app", "worker", "-l", "info"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=uu_backend.django_project.settings.local
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - CHROMA_PERSIST_DIRECTORY=/app/data/chroma
      - DJANGO_DATABASE_URL=${DJANGO_DATABASE_URL:-postgres://uu:uu@postgres:5432/uu_django}
    volumes:
      - chroma_data:/app/data/chroma
      - file_storage:/app/data/files
      - taxonomy_data:/app/data
      - ./data/documents:/app/data/documents
    depends_on:
      - redis
      - neo4j
      - postgres

  postgres:
    image: postgres:16
    container_name: uu-postgres
    environment:
      - POSTGRES_DB=uu_django
      - POSTGRES_USER=uu
      - POSTGRES_PASSWORD=uu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uu -d uu_django"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  chroma_data:
    driver: local
  file_storage:
    driver: local
  taxonomy_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  postgres_data:
    driver: local

networks:
  default:
    name: uu-network
